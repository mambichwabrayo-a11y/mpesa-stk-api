<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Pesa Payment Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Inter',sans-serif;
            background:linear-gradient(135deg,#00a651 0%,#00703c 100%);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
            /* Glossy effect */
            position:relative;
            overflow-x:hidden;
        }
        /* Glossy background blobs */
        body::before,body::after{
            content:'';
            position:absolute;
            border-radius:50%;
            filter:blur(80px);
            opacity:0.4;
            z-index:0;
        }
        body::before{
            width:300px;height:300px;
            background:#00ff88;
            top:-100px;left:-100px;
        }
        body::after{
            width:250px;height:250px;
            background:#00a651;
            bottom:-80px;right:-80px;
        }
       .container{
            background:rgba(255,255,255,0.9);
            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.3);
            border-radius:24px;
            box-shadow:0 20px 60px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.6);
            max-width:450px;
            width:100%;
            overflow:hidden;
            position:relative;
            z-index:1;
        }
       .header{
            background:linear-gradient(135deg,#00a651 0%,#00703c 100%);
            padding:40px 30px;
            text-align:center;
            color:white;
            position:relative;
        }
       .header::after{
            content:'';
            position:absolute;
            top:0;left:0;right:0;bottom:0;
            background:linear-gradient(180deg,rgba(255,255,255,0.15) 0%,transparent 100%);
            pointer-events:none;
        }
       .header h1{font-size:28px;font-weight:700;margin-bottom:8px;position:relative}
       .header p{font-size:14px;opacity:0.9;position:relative}
       .mpesa-logo{
            width:60px;height:60px;
            background:rgba(255,255,255,0.95);
            border-radius:50%;
            margin:0 auto 15px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:700;
            color:#00a651;
            font-size:24px;
            box-shadow:0 4px 15px rgba(0,0,0,0.15);
            position:relative;
        }
       .form-body{padding:40px 30px}
       .form-group{margin-bottom:24px}
       .form-group label{display:block;font-size:14px;font-weight:600;color:#333;margin-bottom:8px}
       .input-wrapper{position:relative}
       .input-prefix{
            position:absolute;
            left:16px;
            top:50%;
            transform:translateY(-50%);
            color:#666;
            font-weight:600;
            font-size:16px;
            pointer-events:none;
            z-index:2;
        }
       .input-prefix.phone-prefix{
            color:#00a651;
            font-weight:700;
        }
        input{
            width:100%;
            padding:14px 16px;
            border:2px solid rgba(0,0,0,0.08);
            border-radius:12px;
            font-size:16px;
            transition:all 0.3s;
            background:rgba(255,255,255,0.7);
        }
        input.with-prefix{padding-left:60px}
        input.phone-input{padding-left:70px}
        input:focus{
            outline:none;
            border-color:#00a651;
            box-shadow:0 0 0 4px rgba(0,166,81,0.1);
            background:rgba(255,255,255,0.95);
        }
        button{
            width:100%;
            padding:16px;
            background:linear-gradient(135deg,#00a651 0%,#00703c 100%);
            color:white;
            border:none;
            border-radius:12px;
            font-size:16px;
            font-weight:700;
            cursor:pointer;
            transition:all 0.3s;
            box-shadow:0 4px 15px rgba(0,166,81,0.3);
        }
        button:hover:not(:disabled){
            transform:translateY(-2px);
            box-shadow:0 10px 25px rgba(0,166,81,0.4)
        }
        button:disabled{
            opacity:0.6;
            cursor:not-allowed;
            transform:none
        }
        #status{
            margin-top:20px;
            padding:16px;
            border-radius:12px;
            font-size:14px;
            font-weight:500;
            text-align:center;
            display:none;
            backdrop-filter:blur(10px);
        }
       .success{background:rgba(212,237,218,0.9);color:#155724;border:1px solid #c3e6cb}
       .error{background:rgba(248,215,218,0.9);color:#721c24;border:1px solid #f5c6cb}
       .pending{background:rgba(255,243,205,0.9);color:#856404;border:1px solid #ffeaa7}
       .footer{
            text-align:center;
            padding:20px;
            font-size:12px;
            color:#333;
            border-top:1px solid rgba(0,0,0,0.05);
            background:rgba(255,255,255,0.5);
        }
       .footer.brand{
            color:#00a651;
            font-weight:700;
        }
       .spinner{
            border:3px solid #f3f3f3;
            border-top:3px solid #00a651;
            border-radius:50%;
            width:20px;
            height:20px;
            animation:spin 1s linear infinite;
            display:inline-block;
            margin-right:8px;
            vertical-align:middle
        }
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="mpesa-logo">M</div>
            <h1>M-Pesa Payment</h1>
            <p>Fast, Secure & Reliable</p>
        </div>

        <div class="form-body">
            <div class="form-group">
                <label for="amount">Enter Amount (KES)</label>
                <div class="input-wrapper">
                    <span class="input-prefix">KES</span>
                    <input type="number" id="amount" class="with-prefix" placeholder="0.00" min="1" step="1">
                </div>
            </div>

            <div class="form-group">
                <label for="phone">M-Pesa Phone Number</label>
                <div class="input-wrapper">
                    <span class="input-prefix phone-prefix">254|</span>
                    <input type="tel" id="phone" class="phone-input" placeholder="7XXXXXXXX" maxlength="9" inputmode="numeric" pattern="[17][0-9]{8}">
                </div>
            </div>

            <button id="payBtn" onclick="initiatePayment()">Pay with M-Pesa</button>
            <div id="status"></div>
        </div>

        <div class="footer">Powered by <span class="brand">Mpesa</span> | Secured by <span class="brand">Payhero</span></div>
    </div>

    <script>
        var STK_PUSH_URL='/api/stk';
        var CHECK_PAYMENT_URL='/api/check-payment';
        var checkInterval;

        // Auto-scroll inputs into view on mobile when keyboard opens
        document.getElementById('amount').addEventListener('focus', function() {
            setTimeout(() => this.scrollIntoView({behavior: 'smooth', block: 'center'}), 300);
        });
        document.getElementById('phone').addEventListener('focus', function() {
            setTimeout(() => this.scrollIntoView({behavior: 'smooth', block: 'center'}), 300);
        });

        // Prevent non-numeric input on phone field
        document.getElementById('phone').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        function showStatus(message,type,loading=false){
            var statusDiv=document.getElementById('status');
            statusDiv.style.display='block';
            statusDiv.className=type;
            if(loading){statusDiv.innerHTML='<span class="spinner"></span>'+message}
            else{statusDiv.innerHTML=message}
        }

        function initiatePayment(){
            var amount=document.getElementById('amount').value;
            var phoneInput=document.getElementById('phone').value;
            var phone = '254' + phoneInput; // 254 is mandatory prefix
            var payBtn=document.getElementById('payBtn');

            if(!amount||amount<1){showStatus('Please enter a valid amount','error');return}
            if(!phoneInput||phoneInput.length!==9||!/^[17]/.test(phoneInput)){showStatus('Weka namba sahihi: 7XXXXXXXX au 1XXXXXXXX','error');return}

            payBtn.disabled=true;
            payBtn.innerHTML='Processing...';
            showStatus('Sending STK Push to your phone...','pending',true);

            fetch(STK_PUSH_URL,{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({amount:parseInt(amount),phone:phone})
            })
           .then(res=>res.json())
           .then(data=>{
                if(data.CheckoutRequestID){
                    showStatus('STK Push sent! Enter your M-Pesa PIN on your phone','pending',true);
                    checkPaymentStatus(data.CheckoutRequestID)
                }else{
                    throw new Error(data.error||'Failed to initiate payment')
                }
            })
           .catch(err=>{
                showStatus('Error: '+err.message,'error');
                payBtn.disabled=false;
                payBtn.innerHTML='Pay with M-Pesa'
            })
        }
        function checkPaymentStatus(ref){
            var payBtn=document.getElementById('payBtn');
            var attempts=0;

            checkInterval=setInterval(function(){
                attempts++;
                fetch(CHECK_PAYMENT_URL+'?ref='+ref)
               .then(res=>res.json())
               .then(data=>{
                    if(data.payment_status==='paid'){
                        clearInterval(checkInterval);
                        showStatus('✓ Payment Successful! Receipt: '+data.mpesa_receipt,'success');
                        payBtn.disabled=false;
                        payBtn.innerHTML='Pay with M-Pesa';
                        document.getElementById('amount').value='';
                        document.getElementById('phone').value=''
                    }else if(data.payment_status==='failed'){
                        clearInterval(checkInterval);
                        showStatus('✗ Payment failed. Please try again','error');
                        payBtn.disabled=false;
                        payBtn.innerHTML='Pay with M-Pesa'
                    }else if(attempts>30){
                        clearInterval(checkInterval);
                        showStatus('Request timeout. Check your M-Pesa messages','error');
                        payBtn.disabled=false;
                        payBtn.innerHTML='Pay with M-Pesa'
                    }
                })
               .catch(function(){
                    if(attempts>30){
                        clearInterval(checkInterval);
                        payBtn.disabled=false;
                        payBtn.innerHTML='Pay with M-Pesa'
                    }
                })
            },3000)
        }
    </script>
</body>
</html>
